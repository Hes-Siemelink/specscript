Input schema:
  type: object
  properties:
    id:
      description: Contact identifier
  required: [ id ]

Connect to: Contact DB

SQLite:
  update:
    - DELETE FROM contact WHERE id = '${input.id}';
  query: |
    SELECT '${input.id}' AS id,
      CASE
        WHEN changes() > 0 THEN 'Contact deleted'
        ELSE 'Contact not found'
      END AS message;
