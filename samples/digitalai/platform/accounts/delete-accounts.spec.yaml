Script info:
  description: Deletes accounts from Digital.ai Platform

Input schema:
  type: object
  properties:
    name:
      description: Account name (leave empty to show all accounts)

---
Connect to: Digital.ai Platform

Search accounts:
  name: ${input.name}

Prompt:
  description: Select account to delete
  type: array
  items:
    enum: ${output}
    x-title-property: name

For each:
  Print: DELETE /identity/v1/accounts/${item.id}
  DELETE: /identity/v1/accounts/${item.id}
