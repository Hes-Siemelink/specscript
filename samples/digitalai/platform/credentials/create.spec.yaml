Script info:
  description: Configures new credentials

Print: Please enter your credentials to connect to Digital.ai Platform

Input schema:
  type: object
  properties:
    url:
      description: Digital.ai Platform target
      enum:
        - name: Staging
          url: https://api.staging.digitalai.cloud
        - name: Production
          url: https://api.us.digitalai.cloud
      display property: name
      value property: url
    id:
      description: Tenant ID
    method:
      description: Authentication method
      enum:
        - Username and password
        - Token
    token:
      description: Token value
      secret: true
      condition:
        item: ${input.method}
        equals: Token
    username:
      description: Username
      condition:
        item: ${input.method}
        equals: Username and password
    password:
      description: Password
      secret: true
      condition:
        item: ${input.method}
        equals: Username and password
    name:
      description: Display name for this account

Create credentials:
  target: Digital.ai Platform
  credentials: ${input}
