Script info:
  description: Configures new credentials

Print: Please enter your credentials to connect to Digital.ai Release

Input schema:
  type: object
  properties:
    url:
      description: Digital.ai Release URL
    username:
      description: Username
    password:
      description: Password
      secret: true
    name:
      description: Account name

Create credentials:
  target: Digital.ai Release
  credentials: ${input}
