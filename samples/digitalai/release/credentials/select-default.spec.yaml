Script info:
  description: Select default credentials

Input schema:
  type: object
  properties:
    target:
      description: Target service
      default: Digital.ai Release

---
Get all credentials: ${input.target}
Append:
  name: "* Add new credentials"
As: ${accounts}

---
Prompt:
  description: Select default account to log in with
  enum: ${accounts}
  display property: name
As: ${account}

---
If:
  empty: ${account.url}
  then:
    Create: { }
    As: ${account}

---
Set default credentials:
  target: ${input.target}
  name: ${account.name}

Output: Using ${account.name} to log in to ${input.target}