Script info: Moves a folder

Connect to: Digital.ai Release

---
GET: /api/v1/folders/list?depth=10
Flat folder list:
  folders: ${output}
As: ${folders}

---
Prompt:
  description: Select the folder you want to move
  enum: ${folders}
  display property: title
As: ${source}

---
Prompt:
  description: Select the new parent folder
  enum: ${folders}
  display property: title
As: ${target}

---
POST:
  path: /api/v1/folders/${source.id}/move?newParentId=${target.id}
  body: { }

---
Print: "New folder structure:\n"
List: { }