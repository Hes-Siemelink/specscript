Print: Please configure a connection to Digital.ai Release

Script info:
  description: Configures a new connection

Input schema:
  type: object
  properties:
    url:
      description: Digital.ai Release URL
    username:
      description: Username
    password:
      description: Password
      secret: true
    name:
      description: Account name

Create credentials:
  target: Digital.ai Release
  credentials: ${input}
