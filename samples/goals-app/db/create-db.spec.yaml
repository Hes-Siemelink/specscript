Script info: Create a new goal database

Connect to: Goal DB

SQLite:
  update:
    - |
      CREATE TABLE goal (
        id INTEGER PRIMARY KEY AUTOINCREMENT,
        title TEXT NOT NULL,
        description TEXT NOT NULL,
        state TEXT NOT NULL DEFAULT 'todo' CHECK (state IN ('todo','in_progress','completed')),
        priority TEXT NOT NULL DEFAULT 'medium' CHECK (priority IN ('low','medium','high')),
        assignee TEXT,
        parent_id INTEGER REFERENCES goal(id) ON DELETE CASCADE,
        created_at TEXT NOT NULL DEFAULT (strftime('%Y-%m-%dT%H:%M:%fZ','now')),
        updated_at TEXT NOT NULL DEFAULT (strftime('%Y-%m-%dT%H:%M:%fZ','now'))
      );
    - CREATE INDEX idx_goal_assignee ON goal(assignee);
    - CREATE INDEX idx_goal_state ON goal(state);
    - CREATE INDEX idx_goal_parent ON goal(parent_id);

Print: Goal database created

