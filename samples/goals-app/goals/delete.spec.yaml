Input parameters:
  id:
    description: Goal identifier

Connect to: Goal DB

SQLite:
  update:
    - PRAGMA foreign_keys = ON;
    - DELETE FROM goal WHERE id = '${input.id}';
  query: |
    SELECT '${input.id}' AS id,
      CASE
        WHEN changes() > 0 THEN 'Goal deleted'
        ELSE 'Goal not found'
      END AS message;
