# Setup and teardown
#
# Demonstrates Before all tests and After all tests for shared initialization
# and cleanup. Run with: spec --test setup-teardown.spec.yaml
#
# 'Before all tests' runs once before all tests. State carries forward.
# 'After all tests' runs once after the last test. Use it for cleanup.

Script info: Setup and teardown example

Before all tests:
  Http server:
    name: status-server
    port: 2526
    endpoints:
      /status:
        get:
          output: ok
      /version:
        get:
          output: 1.0.0
  Http request defaults:
    url: http://localhost:2526

Tests:

  Status endpoint returns ok:
    GET: /status
    Expected output: ok

  Version endpoint returns version:
    GET: /version
    Expected output: 1.0.0

After all tests:
  Stop http server: status-server
