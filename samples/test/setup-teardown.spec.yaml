# Setup and teardown
#
# Demonstrates Before tests and After tests for shared initialization
# and cleanup. Run with: spec --test setup-teardown.spec.yaml
#
# 'Before tests' runs once before all tests. State carries forward.
# 'After tests' runs once after the last test. Use it for cleanup.

Script info: Setup and teardown example

Before tests:
  Http server:
    port: 2526
    endpoints:
      /status:
        get:
          output: ok
      /version:
        get:
          output: 1.0.0
  Http request defaults:
    url: http://localhost:2526

Tests:

  Status endpoint returns ok:
    GET: /status
    Expected output: ok

  Version endpoint returns version:
    GET: /version
    Expected output: 1.0.0

After tests:
  Http server:
    port: 2526
    stop: true
