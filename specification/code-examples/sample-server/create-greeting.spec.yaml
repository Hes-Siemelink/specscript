Script info:
  description: Script to create a greeting in different languages

Input schema:
  type: object
  properties:
    name:
      description: the person to greet
    language:
      description: the language to greet in

Find:
  path: ${input.language}
  in:
    English: Hi
    Spanish: ¡Hola
    Dutch: Hoi
As: ${greetings}

Output: ${greetings} ${input.name}!
