Script info:
  description: Get a greeting form the server

Input schema:
  type: object
  properties:
    name:
      description: Enter your name
    language:
      description: Select a language
      enum:
        - English
        - Spanish
        - Dutch

POST:
  url: http://localhost:2525/greeting
  body:
    name: ${input.name}
    language: ${input.language}

Print: ${output}
