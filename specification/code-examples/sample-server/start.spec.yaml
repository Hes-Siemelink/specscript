Script info:
  description: Start the SpecScript Sample Server

Http server:
  name: sample-server
  port: 2525

  endpoints:
    /hello:
      get:
        output: Hello from SpecScript!

    /greeting:
      post: create-greeting.spec.yaml

    /greetings:
      get:
        output:
          English: Hello!
          Spanish: ¡Hola!
          Dutch: Hallo!

    /items:
      get:
        output:
          - 1
          - 2
          - 3
      post:
        script:
          Fields: ${input}
      put:
        script:
          Fields: ${input}
      patch:
        script:
          Fields: ${input}
      delete:
        output: { }

    /echo/header:
      get:
        output: ${request.headers}

    /echo/path/{path}:
      get:
        output: ${request.pathParameters}

    /echo/query:
      get:
        output: ${request.queryParameters}

    /echo/body:
      post:
        output: ${request.body}

    /echo/cookies:
      get:
        output: ${request.cookies}
