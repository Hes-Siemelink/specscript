$id: "https://specscript.info/v1/commands/core/ParameterData"
$schema: https://json-schema.org/draft/2020-12/schema

oneOf:
  - type: string

  - type: object
    properties:
      "title":
        type: string
      "description":
        type: string
      "default": { }
      "type":
        type: string
      "format":
        type: string
      "enum":
        type: array
      "items":
        $ref: "/v1/commands/core/ParameterData.schema.yaml"
      "properties":
        type: object
        additionalProperties:
          $ref: "/v1/commands/core/ParameterData.schema.yaml"
      "required":
        type: array
        items:
          type: string
      "x-condition":
        $ref: "/v1/commands/core/Conditions.schema.yaml"
      "x-env":
        type: string
      "x-title-property":
        type: string
      "x-value-property":
        type: string
      "x-short-option":
        type: string
    additionalProperties: false
