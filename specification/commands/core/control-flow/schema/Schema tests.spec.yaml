Tests:

  No extra properties in If:

    Validate schema:
      data:
        empty: { }
        then:
          Print: something
        extra: property
      schema: If.schema.yaml

    Expected error:
      Schema validation error: Schema should not allow extra properties in 'If'

  If without then:

    Validate schema:
      data:
        empty: { }
      schema: If.schema.yaml

    Expected error:
      Schema validation error: Schema should not allow missing 'then'

  When with both 'then' and 'else':

    Validate schema:
      data:
        - empty: { }
          then:
            Print: something
          else:
            Print: else
      schema: When.schema.yaml

    Expected error:
      Schema validation error: Having both 'then' and 'else' should trigger a validation error

  Validate conditions in When:

    Validate schema:
      data:
        - not:
            strange: property
          then:
            Print: something
      schema: When.schema.yaml

    Expected error:
      Schema validation error: Conditions should be properly validated
