Tests:

  Do with a list returns last output:

    Output: Hello
    Do:
      - Output: one
      - Output: two
      - Output: three

    Expected output: three

  Chained output in list execution:

    ${output}: one

    Do:
      - ${output}: two
      - ${var}: ${output}

    Assert equals:
      - actual: ${var}
        expected: two
