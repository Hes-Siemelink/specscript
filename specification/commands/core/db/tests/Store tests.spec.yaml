Tests:

  Select with where clause:

    Shell: rm -f ${SCRIPT_TEMP_DIR}/json_sample.db

    Store:
      file: ${SCRIPT_TEMP_DIR}/json_sample.db
      table: json_data
      insert:
        - greeting: Hello
          language: English
        - greeting: Hola
          language: Spanish
      query:
        where: $.language = 'Spanish'

    Expected output:
      - greeting: Hola
        language: Spanish

  Selected fields:

    Shell: rm -f ${SCRIPT_TEMP_DIR}/sample.db

    Store:
      file: ${SCRIPT_TEMP_DIR}/sample.db
      table: users
      insert:
        - name: Alice
          age: 16
        - name: Bob
          age: 17
        - name: Charlie
          age: 18
      query:
        select:
          - name
        where: $.age < 18

    Expected output:
      - name: Alice
      - name: Bob

  Multiple selected fields:

    Shell: rm -f ${SCRIPT_TEMP_DIR}/multi_select.db

    Store:
      file: ${SCRIPT_TEMP_DIR}/multi_select.db
      table: users
      insert:
        - name: Alice
          age: 16
        - name: Bob
          age: 17
      query:
        select:
          - name
          - age
        where: $.age < 18

    Expected output:
      - name: Alice
        age: 16
      - name: Bob
        age: 17
