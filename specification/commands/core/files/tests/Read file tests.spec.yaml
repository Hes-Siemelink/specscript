Tests:

  Read file from disk:

    Read file: content/plain.yaml

    Expected output:
      loaded: true

  Read file relative to script:

    Read file: ${SCRIPT_HOME}/content/plain.yaml

    Expected output:
      loaded: true

  Read file with variable syntax and multiple documents:

    Read file: content/multiple documents.yaml
    ${raw}: ${output}

    Assert that:
      item:
        test: true
        something: else
      in:
        ${output}
