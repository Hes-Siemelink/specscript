$schema: https://json-schema.org/draft/2020-12/schema

type: object
properties:
  name:
    type: string
  port:
    type: integer
  stop:
    type: boolean
  endpoints:
    type: object
    additionalProperties:
      $ref: "#/definitions/Endpoint"
required:
  - name
additionalProperties: false

definitions:

  Endpoint:
    type: object
    properties:
      get:
        $ref: "#/definitions/MethodHandler"
      post:
        $ref: "#/definitions/MethodHandler"
      patch:
        $ref: "#/definitions/MethodHandler"
      put:
        $ref: "#/definitions/MethodHandler"
      delete:
        $ref: "#/definitions/MethodHandler"

  MethodHandler:
    type:
      - string
      - object
    properties:
      output: { }
      script:
        type: object
      file:
        type: string
    additionalProperties: false
