Before all tests:

  Http request defaults:
    url: http://localhost:2525
    cookies:
      maria: biscuit

Tests:

  GET with full URL:

    GET: http://localhost:2525/items

    Expected output:
      - 1
      - 2
      - 3

  GET with implicit url and explicit path parameter:

    GET:
      path: /items

    Expected output:
      - 1
      - 2
      - 3

  GET with query parameters:

    GET: /echo/query?content=hello

    Expected output:
      content: hello

  POST:

    POST:
      path: /echo/body
      body:
        1: One
        2: Two
        3: Three

    Expected output:
      1: One
      2: Two
      3: Three

  POST with list:

    POST:
      path: /echo/body
      body:
        - One
        - Two
        - Three

    Expected output:
      - One
      - Two
      - Three

  POST without path parameter:

    POST:
      url: http://localhost:2525/echo/body
      body:
        1: One
        2: Two
        3: Three

    Expected output:
      1: One
      2: Two
      3: Three

  Headers:

    GET:
      path: /echo/header
      headers:
        Test: something

    Assert that:
      item:
        Test: something
      in: ${output}

  Cookies:

    GET:
      path: /echo/cookies
      cookies:
        speculaas: spicy

    Expected output:
      maria: biscuit
      speculaas: spicy

  Path parameters:

    GET:
      path: /echo/path/custom

    Expected output:
      path: custom
