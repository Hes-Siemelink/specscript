Tests:

  Start and stop server:

    Do:
      - Http server:
          port: 25001
          endpoints:
            /hello:
              get:
                output: Hello

      - GET: http://localhost:25001/hello

      - Expected output: Hello

      - Http server:
          port: 25001
          stop: true

  Endpoint with script output:

    Do:
      - Http server:
          port: 25001
          endpoints:
            /hello:
              get:
                script:
                  Output: Hello again

      - GET: http://localhost:25001/hello

      - Expected output: Hello again

      - Http server:
          port: 25001
          stop: true
