Test case: Input schema populates input variable

Input schema:
  type: object
  properties:
    name:
      description: Your name
      default: world

Assert equals:
  actual: ${input}
  expected:
    name: world

---
Test case: Input schema populates top-level variables

Input schema:
  type: object
  properties:
    greeting:
      default: Hello
    name:
      default: World

Assert equals:
  actual: ${greeting}, ${name}!
  expected: Hello, World!

---
Test case: Input schema with pre-existing input values

${input}:
  name: Alice

Input schema:
  type: object
  properties:
    name:
      description: Your name
      default: Fallback

Assert equals:
  actual: ${name}
  expected: Alice

---
Test case: Input schema with multiple defaults

Input schema:
  type: object
  properties:
    a:
      default: 1
    b:
      default: 2
    c:
      default: 3

Assert equals:
  actual: ${input}
  expected:
    a: 1
    b: 2
    c: 3

