---
Test case: Input schema with boolean default

Input schema:
  type: object
  properties:
    verbose:
      description: Verbose output?
      default: true

Assert that:
  item: ${verbose}
  equals: true

---
Test case: Input schema conditional includes matching property

${input}: { }

Input schema:
  type: object
  properties:
    mode:
      default: fast
    fast-option:
      description: Fast mode setting
      default: turbo
      condition:
        item: ${input.mode}
        equals: fast
    slow-option:
      description: Slow mode setting
      default: crawl
      condition:
        item: ${input.mode}
        equals: slow

Assert equals:
  actual: ${input}
  expected:
    mode: fast
    fast-option: turbo

---
Test case: Input schema conditional with other branch

${input}:
  mode: slow

Input schema:
  type: object
  properties:
    mode:
      default: fast
    fast-option:
      default: turbo
      condition:
        item: ${input.mode}
        equals: fast
    slow-option:
      default: crawl
      condition:
        item: ${input.mode}
        equals: slow

Assert equals:
  actual: ${input}
  expected:
    mode: slow
    slow-option: crawl

---
Test case: Input schema pre-existing values are not overwritten by defaults

${input}:
  name: Provided
  color: red

Input schema:
  type: object
  properties:
    name:
      default: Default
    color:
      default: blue
    extra:
      default: bonus

Assert equals:
  actual: ${input}
  expected:
    name: Provided
    color: red
    extra: bonus

