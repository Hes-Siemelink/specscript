Tests:

  Simple question:

    Answers:
      "What is your name?": Emma

    Prompt: What is your name?

    Expected output: Emma

  Default answer:

    Prompt:
      title: How much is 1 + 1?
      default: 2

    Expected output: 2

  Recorded answer overrides default:

    Answers:
      How much is 1 + 1?: 3

    Prompt:
      title: How much is 1 + 1?
      default: 2

    Expected output: 3

  Description used as question when there is no title:

    Answers:
      How much is 1 + 1?: "2"

    Prompt:
      description: How much is 1 + 1?

    Expected output: "2"

  Text placeholder when no value in non-interactive mode:

    Prompt: Anything?

    Expected output: "[default answer in non-interactive mode]"

  Multiple questions:

    Answers:
      - "What is your name?": Mateo

    Prompt:
      type: object
      properties:
        name:
          title: What is your name?
        sum:
          title: How much is 1 + 1?
          default: 2

    Expected output:
      name: Mateo
      sum: "2"

  Property name used as question when there is no title or description:

    Answers:
      name: Alice

    Prompt:
      type: object
      properties:
        name:
          type: string

    Expected output:
      name: Alice

  Boolean choice:

    Answers:
      Enabled: "true"

    Prompt:
      type: object
      properties:
        enabled:
          title: Enabled
          enum:
            - true
            - false

    Expected output:
      enabled: true

  Conditional and dependent questions:

    Answers:
      Choose which variable to set: a
      Value for a: a is set
      Value for b: b is set

    Prompt:
      type: object
      properties:
        switch:
          title: Choose which variable to set
        a:
          title: Value for a
          x-condition:
            item: ${switch}
            equals: a
        b:
          title: Value for b
          x-condition:
            item: ${switch}
            equals: b

    Expected output:
      switch: a
      a: a is set

  Select object from list:

    Answers:
      Select account: dev

    Prompt:
      title: Select account
      enum:
        - name: dev
          id: 123
          password: xxxx
        - name: test
          id: 456
          password: xxxx
        - name: prod
          id: 789
          password: xxxx
      x-title-property: name

    Expected output:
      name: dev
      id: 123
      password: xxxx

  Select value field only:

    Answers:
      Favorite channel: The News

    Prompt:
      title: Favorite channel
      enum:
        - name: The News
          preset: 1
        - name: Sports Unlimited
          preset: 2
      x-title-property: name
      x-value-property: preset

    Expected output: 1

  Select multiple items from list:

    Answers:
      What flavors do you like?:
        - Coconut
        - Pineapple

    Prompt:
      title: What flavors do you like?
      type: array
      items:
        enum:
          - Vanilla
          - Mango
          - Coconut
          - Pineapple

    Expected output:
      - Coconut
      - Pineapple

  Select multiple value fields:

    Answers:
      Favorite channel:
        - The News
        - Sports Unlimited

    Prompt:
      title: Favorite channel
      type: array
      items:
        enum:
          - name: The News
            preset: 1
          - name: Sports Unlimited
            preset: 2
          - name: Cartoon Channel
            preset: 3
        x-title-property: name
        x-value-property: preset

    Expected output:
      - 1
      - 2
