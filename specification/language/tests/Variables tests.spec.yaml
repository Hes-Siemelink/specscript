Tests:

  Bracket notation with nested property:

    ${config}:
      server.host:
        name: localhost
        port: 8080

    Assert equals:
      - actual: ${config["server.host"].name}
        expected: localhost
      - actual: ${config["server.host"].port}
        expected: 8080

  Bracket notation with multiple dots in key:

    ${api}:
      com.example.service:
        status: ok

    Assert equals:
      actual: ${api["com.example.service"].status}
      expected: ok

  Bracket notation for key with spaces:

    ${data}:
      first name: Alice

    Assert equals:
      actual: ${data["first name"]}
      expected: Alice

  Bracket notation mixed with array index:

    ${data}:
      items:
        - name.first: Alice
        - name.first: Bob

    Assert equals:
      - actual: ${data.items[0]["name.first"]}
        expected: Alice
      - actual: ${data.items[1]["name.first"]}
        expected: Bob


  SCRIPT_DIR is available:

    Assert that:
      not:
        empty: ${SCRIPT_DIR}


  SCRIPT_DIR is different from SCRIPT_TEMP_DIR:

    Temp file:
      filename: marker.txt
      content: x

    Assert that:
      not:
        item: ${SCRIPT_DIR}
        equals: ${SCRIPT_TEMP_DIR}


  Unset environment variable is empty:

    Assert that:
      empty: ${env.THIS_VAR_CERTAINLY_DOES_NOT_EXIST_12345}
